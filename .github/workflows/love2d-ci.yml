name: LOVE2D Build and Deploy (Reusable)

on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
        description: "Human-readable project name"
      love_filename:
        required: true
        type: string
        description: "Base name for the .love file without extension"
      branch:
        required: false
        type: string
        default: "master"
        description: "Main branch name"
      love_version:
        required: false
        type: string
        default: "11.5"
        description: "LOVE2D version for platform builds"

env:
  LOVE_VERSION: ${{ inputs.love_version }}

jobs:
  lint:
    name: Lint 🔍
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache lint tools
        id: lint-cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/luarocks
            /usr/local/share/lua
            /usr/local/bin/luacheck
            /usr/local/bin/stylua
          key: lint-tools-v1

      - name: Install Luacheck
        if: steps.lint-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lua5.1 luarocks
          sudo luarocks install luacheck

      - name: Install Lua runtime
        if: steps.lint-cache.outputs.cache-hit == 'true'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lua5.1

      - name: Install StyLua
        if: steps.lint-cache.outputs.cache-hit != 'true'
        run: |
          curl -sL https://github.com/JohnnyMorganz/StyLua/releases/latest/download/stylua-linux-x86_64.zip -o stylua.zip
          unzip -oq stylua.zip -d /usr/local/bin
          chmod +x /usr/local/bin/stylua

      - name: Copy shared lint configs to project root
        run: |
          cp src/love2d4me/.luacheckrc .luacheckrc 2>/dev/null || true
          cp src/love2d4me/.stylua.toml .stylua.toml 2>/dev/null || true

      - name: Luacheck
        run: luacheck src/ --exclude-files "src/lib/*"

      - name: Lint variables
        run: node src/love2d4me/scripts/lint-vars.js src

      - name: StyLua
        run: stylua --check src/ --glob "**/*.lua" || echo "StyLua warnings (non-blocking)"

  build:
    name: Build 🛠️
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pack .love file
        run: npm run pack

      - name: Build web (love.js)
        run: npm run build

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: Web-build
          path: Web/

      - name: Upload .love file
        uses: actions/upload-artifact@v4
        with:
          name: love-file
          path: ${{ inputs.love_filename }}.love

      - name: Upload app logo
        uses: actions/upload-artifact@v4
        with:
          name: app-logo
          path: .github/pages/logo.png
          if-no-files-found: ignore

  build_platforms:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            name: 'Windows 🪟'
            artifact: windows
            runtime_url_suffix: '-win64.zip'
            runtime_dir: 'win64'
          - platform: macos
            name: 'macOS 🍎'
            artifact: macos
            runtime_url_suffix: '-macos.zip'
            runtime_dir: 'macos'
          - platform: linux
            name: 'Linux 🐧'
            artifact: linux
            runtime_url_suffix: '-x86_64.AppImage'
            runtime_dir: 'linux'
    steps:
      - name: Download .love file
        uses: actions/download-artifact@v4
        with:
          name: love-file
          path: .

      - name: Cache LOVE runtime
        id: love-cache
        uses: actions/cache@v4
        with:
          path: love-runtime
          key: love-${{ matrix.platform }}-${{ env.LOVE_VERSION }}

      - name: Download LOVE runtime
        if: steps.love-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p love-runtime
          curl -sL "https://github.com/love2d/love/releases/download/${LOVE_VERSION}/love-${LOVE_VERSION}${{ matrix.runtime_url_suffix }}" \
            -o love-runtime/love-download
          if [[ "${{ matrix.platform }}" != "linux" ]]; then
            cd love-runtime && unzip -q love-download && rm love-download
          fi

      - name: Checkout SFX stub
        if: matrix.platform == 'windows'
        uses: actions/checkout@v4
        with:
          repository: andrewiankidd/love2d4me
          sparse-checkout: .github/bin
          path: love2d4me-bin

      - name: Fuse (Windows)
        if: matrix.platform == 'windows'
        run: |
          LOVE_DIR="love-runtime/love-${LOVE_VERSION}-win64"
          mkdir -p out
          cat "${LOVE_DIR}/love.exe" "${{ inputs.love_filename }}.love" > "out/${{ inputs.love_filename }}.exe"
          cp "${LOVE_DIR}"/*.dll out/
          cp "${LOVE_DIR}/license.txt" out/ 2>/dev/null || true

          # SFX config — extract to temp dir and run the fused exe
          printf ';!@Install@!UTF-8!\nRunProgram="%s.exe"\n;!@InstallEnd@!\n' \
            "${{ inputs.love_filename }}" > sfx_config.txt

          # Pack into single self-extracting exe
          7z a -mx=9 -mmt=on game.7z ./out/*
          cat love2d4me-bin/.github/bin/7zS2.sfx sfx_config.txt game.7z > "${{ inputs.love_filename }}-windows.exe"

      - name: Fuse (macOS)
        if: matrix.platform == 'macos'
        run: |
          APP_NAME="${{ inputs.project_name }}"
          APP_DIR="${APP_NAME}.app"
          cp -r love-runtime/love.app "${APP_DIR}"
          cp "${{ inputs.love_filename }}.love" "${APP_DIR}/Contents/Resources/"
          sed -i "s|org.love2d.love|co.uk.tiltedcartridge.${{ inputs.love_filename }}|g" "${APP_DIR}/Contents/Info.plist"
          sed -i "s|LÖVE|${APP_NAME}|g" "${APP_DIR}/Contents/Info.plist"
          zip -r "${{ inputs.love_filename }}-macos.zip" "${APP_DIR}"

      - name: Fuse (Linux)
        if: matrix.platform == 'linux'
        run: |
          chmod +x love-runtime/love-download
          cat love-runtime/love-download "${{ inputs.love_filename }}.love" > "${{ inputs.love_filename }}-linux.AppImage"
          chmod +x "${{ inputs.love_filename }}-linux.AppImage"
          zip "${{ inputs.love_filename }}-linux.zip" "${{ inputs.love_filename }}-linux.AppImage"

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-release
          path: |
            ${{ inputs.love_filename }}-${{ matrix.artifact }}.exe
            ${{ inputs.love_filename }}-${{ matrix.artifact }}.zip

  build_android:
    name: 'Android 🤖'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download .love file
        uses: actions/download-artifact@v4
        with:
          name: love-file
          path: .

      - name: Cache love-android source
        id: love-android-cache
        uses: actions/cache@v4
        with:
          path: love-android
          key: love-android-${{ env.LOVE_VERSION }}

      - name: Clone love-android
        if: steps.love-android-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "${{ env.LOVE_VERSION }}" --recursive \
            https://github.com/love2d/love-android.git love-android

      - name: Clean previous embed
        if: steps.love-android-cache.outputs.cache-hit == 'true'
        run: rm -f love-android/app/src/embed/assets/game.love

      - name: Embed .love file
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp "${{ inputs.love_filename }}.love" love-android/app/src/embed/assets/game.love

      - name: Set app identity
        run: |
          PKG_SUFFIX=$(echo "${{ inputs.love_filename }}" | tr '-' '_')
          PROPS=love-android/gradle.properties
          sed -i "s/^app\.application_id=.*/app.application_id=co.uk.tiltedcartridge.${PKG_SUFFIX}/" "$PROPS"
          sed -i "s/^app\.name_byte_array=.*/#app.name_byte_array=/" "$PROPS"
          sed -i "s/^#app\.name=.*/app.name=${{ inputs.project_name }}/" "$PROPS"
          echo "--- gradle.properties identity ---"
          grep -E "^app\.(name|application_id)" "$PROPS"

      - name: Download app logo
        uses: actions/download-artifact@v4
        with:
          name: app-logo
          path: logo-src
        continue-on-error: true

      - name: Generate app icons
        if: hashFiles('logo-src/logo.png') != ''
        run: |
          sudo apt-get install -y -qq imagemagick
          SIZES="mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192"
          for entry in $SIZES; do
            DPI="${entry%%:*}"
            PX="${entry##*:}"
            DIR="love-android/app/src/main/res/drawable-${DPI}"
            mkdir -p "$DIR"
            convert logo-src/logo.png -resize "${PX}x${PX}" "$DIR/love.png"
          done
          echo "Generated icons:"
          find love-android/app/src/main/res/drawable-*/love.png -exec ls -la {} \;

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android SDK components
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
            ${{ env.ANDROID_HOME }}/cmake/3.22.1
          key: android-sdk-ndk26.1-cmake3.22

      - name: Install Android SDK components
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1" "platforms;android-34" "build-tools;34.0.0"

      - name: Install Android platforms
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            love-android/.gradle
            love-android/love/build
            love-android/love/.cxx
          key: gradle-${{ env.LOVE_VERSION }}-${{ hashFiles('love-android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ env.LOVE_VERSION }}-

      - name: Build APK
        working-directory: love-android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: |
          chmod +x gradlew
          ./gradlew assembleEmbedNoRecordRelease

      - name: Sign APK
        run: |
          UNSIGNED=$(find love-android/app/build/outputs/apk -name "*.apk" | head -1)
          ALIGNED="${UNSIGNED%.apk}-aligned.apk"
          SIGNED="${{ inputs.love_filename }}-android.apk"

          # Generate a throwaway keystore for sideload distribution
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Tilted Cartridge, O=Tilted Cartridge, C=GB"

          # Align then sign
          "${ANDROID_HOME}/build-tools/34.0.0/zipalign" -v -p 4 "$UNSIGNED" "$ALIGNED"
          "${ANDROID_HOME}/build-tools/34.0.0/apksigner" sign \
            --ks release.keystore \
            --ks-key-alias release \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$SIGNED" \
            "$ALIGNED"

          # Verify
          "${ANDROID_HOME}/build-tools/34.0.0/apksigner" verify "$SIGNED"
          echo "Signed APK: $(ls -lh "$SIGNED")"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: ${{ inputs.love_filename }}-android.apk

  # TODO: iOS build requires macos-latest runner + Xcode + Apple Developer
  # signing identity (provisioning profile + certificate). Not feasible
  # without a paid Apple Developer account wired into CI secrets.

  release_rolling:
    name: 🔄 Refresh latest-main release
    runs-on: ubuntu-latest
    needs: [build, build_platforms, build_android]
    if: github.ref == format('refs/heads/{0}', inputs.branch)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release files
        run: |
          mkdir -p release
          cd dist
          zip "../release/${{ inputs.love_filename }}-love.zip" "${{ inputs.love_filename }}.love" 2>/dev/null || true
          cp ${{ inputs.love_filename }}-windows.exe ../release/ 2>/dev/null || true
          cp ${{ inputs.love_filename }}-macos.zip ../release/ 2>/dev/null || true
          cp ${{ inputs.love_filename }}-linux.zip ../release/ 2>/dev/null || true
          cp ${{ inputs.love_filename }}-android.apk ../release/ 2>/dev/null || true
          cd ..
          echo "Release files:"
          ls -lh release/

      - name: Delete previous latest-main release + tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest-main --yes --cleanup-tag --repo "${{ github.repository }}" || true

      - name: Publish rolling latest-main release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-main
          name: 'Latest build'
          prerelease: true
          make_latest: 'false'
          draft: false
          target_commitish: ${{ github.sha }}
          body: |
            Auto-built from `${{ inputs.branch }}` at commit `${{ github.sha }}`.

            | Platform | |
            |---|---|
            | 🪟 Windows | `${{ inputs.love_filename }}-windows.exe` |
            | 🍎 macOS | `${{ inputs.love_filename }}-macos.zip` |
            | 🐧 Linux | `${{ inputs.love_filename }}-linux.zip` |
            | 🤖 Android | `${{ inputs.love_filename }}-android.apk` |
            | 🌐 Web | [Play in browser](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/Web/) |
            | 💜 .love | `${{ inputs.love_filename }}-love.zip` |
          files: release/*

  release_tag:
    name: 🏷️ Create tagged release
    runs-on: ubuntu-latest
    needs: [build, build_platforms, build_android]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release files
        run: |
          mkdir -p release
          cd dist
          zip "../release/${{ inputs.love_filename }}-love.zip" "${{ inputs.love_filename }}.love" 2>/dev/null || true
          cp ${{ inputs.love_filename }}-windows.exe ../release/ 2>/dev/null || true
          cp ${{ inputs.love_filename }}-macos.zip ../release/ 2>/dev/null || true
          cp ${{ inputs.love_filename }}-linux.zip ../release/ 2>/dev/null || true
          cp ${{ inputs.love_filename }}-android.apk ../release/ 2>/dev/null || true
          cd ..
          ls -lh release/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ inputs.project_name }} ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: release/*

  deploy:
    name: Deploy to GitHub Pages 🕸️
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == format('refs/heads/{0}', inputs.branch)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: Web-build
          path: Web

      - name: Assemble site
        run: |
          mkdir -p site
          cp -r src/love2d4me/site/* site/ 2>/dev/null || true
          cp -r .github/pages/* site/
          mv Web site/Web
          cp CHANGELOG.md site/ 2>/dev/null || true
          cp -r docs site/docs 2>/dev/null || true
          cp -r assets site/assets 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@4.1.4
        with:
          branch: gh-pages
          folder: site
