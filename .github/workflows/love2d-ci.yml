name: LOVE2D Build and Deploy (Reusable)

on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
        description: "Human-readable project name"
      love_filename:
        required: true
        type: string
        description: "Base name for the .love file without extension"
      branch:
        required: false
        type: string
        default: "master"
        description: "Main branch name"
      love_version:
        required: false
        type: string
        default: "11.5"
        description: "LOVE2D version for platform builds"

env:
  LOVE_VERSION: ${{ inputs.love_version }}

jobs:
  lint:
    name: Lint 🔍
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lua5.1 luarocks
          sudo luarocks install luacheck

      - name: Install StyLua
        run: |
          curl -sL https://github.com/JohnnyMorganz/StyLua/releases/latest/download/stylua-linux-x86_64.zip -o stylua.zip
          unzip -q stylua.zip -d /usr/local/bin
          chmod +x /usr/local/bin/stylua

      - name: Copy shared lint configs to project root
        run: |
          cp src/love2d4me/.luacheckrc .luacheckrc 2>/dev/null || true
          cp src/love2d4me/.stylua.toml .stylua.toml 2>/dev/null || true

      - name: Luacheck
        run: luacheck src/ --exclude-files "src/lib/*"

      - name: Lint variables
        run: node src/love2d4me/scripts/lint-vars.js src

      - name: StyLua
        run: stylua --check src/ --glob "**/*.lua" || echo "StyLua warnings (non-blocking)"

  build:
    name: Build 🛠️
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Pack .love file
        run: npm run pack

      - name: Build web (love.js)
        run: npm run build

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: Web-build
          path: Web/

      - name: Upload .love file
        uses: actions/upload-artifact@v4
        with:
          name: love-file
          path: ${{ inputs.love_filename }}.love

  build_platforms:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            name: 'Windows 🪟'
            artifact: windows
          - platform: macos
            name: 'macOS 🍎'
            artifact: macos
          - platform: linux
            name: 'Linux 🐧'
            artifact: linux
    steps:
      - name: Download .love file
        uses: actions/download-artifact@v4
        with:
          name: love-file
          path: .

      - name: Download LOVE runtime (Windows)
        if: matrix.platform == 'windows'
        run: |
          curl -sL "https://github.com/love2d/love/releases/download/${LOVE_VERSION}/love-${LOVE_VERSION}-win64.zip" -o love-runtime.zip
          unzip -q love-runtime.zip

      - name: Fuse (Windows)
        if: matrix.platform == 'windows'
        run: |
          LOVE_DIR="love-${LOVE_VERSION}-win64"
          mkdir -p out
          cat "${LOVE_DIR}/love.exe" "${{ inputs.love_filename }}.love" > "out/${{ inputs.love_filename }}.exe"
          cp "${LOVE_DIR}"/*.dll out/
          cp "${LOVE_DIR}/license.txt" out/ 2>/dev/null || true
          cd out && zip -r "../${{ inputs.love_filename }}-windows.zip" .

      - name: Download LOVE runtime (macOS)
        if: matrix.platform == 'macos'
        run: |
          curl -sL "https://github.com/love2d/love/releases/download/${LOVE_VERSION}/love-${LOVE_VERSION}-macos.zip" -o love-runtime.zip
          unzip -q love-runtime.zip

      - name: Fuse (macOS)
        if: matrix.platform == 'macos'
        run: |
          APP_NAME="${{ inputs.project_name }}"
          APP_DIR="${APP_NAME}.app"
          cp -r love.app "${APP_DIR}"
          cp "${{ inputs.love_filename }}.love" "${APP_DIR}/Contents/Resources/"
          # Update Info.plist with game identity
          sed -i "s|org.love2d.love|co.uk.tiltedcartridge.${{ inputs.love_filename }}|g" "${APP_DIR}/Contents/Info.plist"
          sed -i "s|LÖVE|${APP_NAME}|g" "${APP_DIR}/Contents/Info.plist"
          zip -r "${{ inputs.love_filename }}-macos.zip" "${APP_DIR}"

      - name: Download LOVE runtime (Linux)
        if: matrix.platform == 'linux'
        run: |
          curl -sL "https://github.com/love2d/love/releases/download/${LOVE_VERSION}/love-${LOVE_VERSION}-x86_64.AppImage" -o love.AppImage
          chmod +x love.AppImage

      - name: Fuse (Linux)
        if: matrix.platform == 'linux'
        run: |
          cat love.AppImage "${{ inputs.love_filename }}.love" > "${{ inputs.love_filename }}-linux.AppImage"
          chmod +x "${{ inputs.love_filename }}-linux.AppImage"
          zip "${{ inputs.love_filename }}-linux.zip" "${{ inputs.love_filename }}-linux.AppImage"

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-release
          path: ${{ inputs.love_filename }}-${{ matrix.artifact }}.*

  release_rolling:
    name: 🔄 Refresh latest-main release
    runs-on: ubuntu-latest
    needs: [build, build_platforms]
    if: github.ref == format('refs/heads/{0}', inputs.branch)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release files
        run: |
          mkdir -p release
          # .love file
          cd dist
          zip "../release/${{ inputs.love_filename }}-love.zip" "${{ inputs.love_filename }}.love" 2>/dev/null || true
          # Platform builds (already zipped)
          cp ${{ inputs.love_filename }}-windows.zip ../release/ 2>/dev/null || true
          cp ${{ inputs.love_filename }}-macos.zip ../release/ 2>/dev/null || true
          cp ${{ inputs.love_filename }}-linux.zip ../release/ 2>/dev/null || true
          cd ..
          echo "Release files:"
          ls -lh release/

      - name: Delete previous latest-main release + tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest-main --yes --cleanup-tag --repo "${{ github.repository }}" || true

      - name: Publish rolling latest-main release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-main
          name: 'Latest build'
          prerelease: true
          make_latest: 'false'
          draft: false
          target_commitish: ${{ github.sha }}
          body: |
            Auto-built from `${{ inputs.branch }}` at commit `${{ github.sha }}`.

            | Platform | |
            |---|---|
            | 🪟 Windows | `${{ inputs.love_filename }}-windows.zip` |
            | 🍎 macOS | `${{ inputs.love_filename }}-macos.zip` |
            | 🐧 Linux | `${{ inputs.love_filename }}-linux.zip` |
            | 🌐 Web | [Play in browser](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/Web/) |
            | 💜 .love | `${{ inputs.love_filename }}-love.zip` |
          files: release/*

  release_tag:
    name: 🏷️ Create tagged release
    runs-on: ubuntu-latest
    needs: [build, build_platforms]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release files
        run: |
          mkdir -p release
          cd dist
          zip "../release/${{ inputs.love_filename }}-love.zip" "${{ inputs.love_filename }}.love" 2>/dev/null || true
          cp ${{ inputs.love_filename }}-windows.zip ../release/ 2>/dev/null || true
          cp ${{ inputs.love_filename }}-macos.zip ../release/ 2>/dev/null || true
          cp ${{ inputs.love_filename }}-linux.zip ../release/ 2>/dev/null || true
          cd ..
          ls -lh release/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ inputs.project_name }} ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: release/*

  deploy:
    name: Deploy to GitHub Pages 🕸️
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == format('refs/heads/{0}', inputs.branch)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: Web-build
          path: Web

      - name: Assemble site
        run: |
          mkdir -p site
          cp -r src/love2d4me/site/* site/ 2>/dev/null || true
          cp -r .github/pages/* site/
          mv Web site/Web
          cp CHANGELOG.md site/ 2>/dev/null || true
          cp -r docs site/docs 2>/dev/null || true
          cp -r assets site/assets 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@4.1.4
        with:
          branch: gh-pages
          folder: site
