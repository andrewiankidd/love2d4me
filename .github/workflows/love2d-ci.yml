name: LOVE2D Build and Deploy (Reusable)

on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
        description: "Human-readable project name (e.g. 'Fear of the Dark')"
      love_filename:
        required: true
        type: string
        description: "Base name for the .love file without extension (e.g. 'FotD')"
      branch:
        required: false
        type: string
        default: "master"
        description: "Main branch name"

jobs:
  lint:
    name: Lint ðŸ”
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install Luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lua5.1 luarocks
          sudo luarocks install luacheck

      - name: Install StyLua
        run: |
          curl -sL https://github.com/JohnnyMorganz/StyLua/releases/latest/download/stylua-linux-x86_64.zip -o stylua.zip
          unzip -q stylua.zip -d /usr/local/bin
          chmod +x /usr/local/bin/stylua

      - name: Copy shared lint configs to project root
        run: |
          cp src/love2d4me/.luacheckrc .luacheckrc 2>/dev/null || true
          cp src/love2d4me/.stylua.toml .stylua.toml 2>/dev/null || true

      - name: Luacheck â€” static analysis
        run: luacheck src/ --exclude-files "src/lib/*"

      - name: StyLua â€” format check
        run: stylua --check src/ --glob "**/*.lua" --exclude "src/lib/**"

  build:
    name: Build ðŸ› ï¸
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Pack .love file
        run: npm run pack

      - name: Build web (love.js)
        run: npm run build

      - name: Compress .love for release
        run: zip ${{ inputs.love_filename }}-love.zip ${{ inputs.love_filename }}.love

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: Web-build
          path: Web/

      - name: Upload .love artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.love_filename }}-love
          path: ${{ inputs.love_filename }}-love.zip

  release_rolling:
    name: ðŸ”„ Refresh latest-main release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == format('refs/heads/{0}', inputs.branch)
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Delete previous latest-main release + tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest-main --yes --cleanup-tag --repo "${{ github.repository }}" || true

      - name: Publish rolling latest-main release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-main
          name: 'Latest build'
          prerelease: true
          make_latest: 'false'
          draft: false
          target_commitish: ${{ github.sha }}
          body: |
            Auto-built from `${{ inputs.branch }}` at commit `${{ github.sha }}`.
          files: dist/${{ inputs.love_filename }}-love.zip

  release_tag:
    name: ðŸ·ï¸ Create tagged release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ inputs.project_name }} ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: dist/${{ inputs.love_filename }}-love.zip

  deploy:
    name: Deploy to GitHub Pages ðŸ•¸ï¸
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == format('refs/heads/{0}', inputs.branch)
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: Web-build
          path: Web

      - name: Assemble site
        run: |
          mkdir -p site
          # Shared template from love2d4me (provides index.html)
          cp -r src/love2d4me/site/* site/ 2>/dev/null || true
          # Project-specific pages overlay (site.json, logo, extras)
          cp -r .github/pages/* site/
          mv Web site/Web
          cp CHANGELOG.md site/ 2>/dev/null || true
          cp -r docs site/docs 2>/dev/null || true
          cp -r assets site/assets 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@4.1.4
        with:
          branch: gh-pages
          folder: site
